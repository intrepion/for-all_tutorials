name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tutorial-generator:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check generator
        run: cargo check --manifest-path scripts/tutorial_generator/Cargo.toml

      - name: Test generator
        run: cargo test --manifest-path scripts/tutorial_generator/Cargo.toml

      - name: Generate tutorials
        run: cargo run --quiet --manifest-path scripts/tutorial_generator/Cargo.toml -- --output-root tutorials

      - name: Verify generated tutorials
        shell: bash
        run: |
          set -euo pipefail
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT
          cargo run --quiet --manifest-path scripts/tutorial_generator/Cargo.toml -- --output-root "$temp_dir"
          diff -ru tutorials "$temp_dir"
